<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Golf Charity Platform</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-container">
      <section class="card auth-card">
        <p class="eyebrow">Golf Charity Subscription Platform</p>
        <h1>Login</h1>
        <p class="subtext">Sign in to view your scores, charity selection, and draw result.</p>

        <form id="loginForm" class="form">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Enter your email" required />

          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Enter your password"
            required
          />

          <button id="loginButton" type="submit" class="button">Login</button>
        </form>

        <p id="message" class="message" aria-live="polite"></p>
        <p class="helper-text">
          New user? <a href="./register.html">Create an account</a>
        </p>
      </section>
    </main>

    <script src="./js/config.js"></script>
    <script src="./js/login.js"></script>
  </body>
</html>
