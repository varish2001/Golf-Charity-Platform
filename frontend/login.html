<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Golf Charity Platform</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <style>
      /* =========================================================
         Microsoft Windows 2000 / Classic UI Theme – Login Page
         ========================================================= */

      @import url('https://fonts.googleapis.com/css2?family=Tahoma:wght@400;700&display=swap');

      /* Win2K desktop background — teal gradient */
      body.auth-page {
        margin: 0;
        min-height: 100vh;
        background: #008080;
        font-family: 'Tahoma', 'MS Sans Serif', Arial, sans-serif;
        font-size: 11px;
        color: #000000;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Remove the shared auth-container grid centering */
      .auth-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 0;
        background: none;
      }

      /* Win2K "Window" dialog box */
      .auth-card {
        all: unset;
        display: block;
        width: 340px;
        background: #d4d0c8;
        border-top: 2px solid #ffffff;
        border-left: 2px solid #ffffff;
        border-right: 2px solid #404040;
        border-bottom: 2px solid #404040;
        box-shadow: 2px 2px 0 #808080, inset 1px 1px 0 #e0ddd8;
        font-family: 'Tahoma', 'MS Sans Serif', Arial, sans-serif;
        font-size: 11px;
        color: #000000;
        border-radius: 0;
      }

      /* Title bar */
      .win2k-titlebar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: linear-gradient(to right, #0a246a, #a6b5e7);
        padding: 3px 4px 3px 6px;
        height: 22px;
        user-select: none;
      }

      .win2k-titlebar-text {
        color: #ffffff;
        font-size: 11px;
        font-weight: 700;
        font-family: 'Tahoma', 'MS Sans Serif', Arial, sans-serif;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .win2k-titlebar-icon {
        width: 14px;
        height: 14px;
        background: #ffffff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
      }

      .win2k-titlebar-btns {
        display: flex;
        gap: 2px;
      }

      .win2k-titlebar-btn {
        width: 16px;
        height: 14px;
        background: #d4d0c8;
        border-top: 1px solid #ffffff;
        border-left: 1px solid #ffffff;
        border-right: 1px solid #404040;
        border-bottom: 1px solid #404040;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: default;
        font-size: 9px;
        font-weight: 700;
        color: #000000;
        font-family: 'Tahoma', Arial, sans-serif;
        box-shadow: inset 1px 1px 0 #e8e4dc;
        line-height: 1;
      }

      .win2k-titlebar-btn:hover {
        background: #e8e4dc;
      }

      /* Dialog body */
      .win2k-body {
        padding: 12px 14px 10px 14px;
      }

      /* Logo / brand area */
      .win2k-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid #808080;
      }

      .win2k-brand-icon {
        width: 32px;
        height: 32px;
        background: #ffffff;
        border: 1px inset #808080;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
        border-top: 2px solid #808080;
        border-left: 2px solid #808080;
        border-right: 2px solid #ffffff;
        border-bottom: 2px solid #ffffff;
      }

      .win2k-brand-text h1 {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        font-family: 'Tahoma', Arial, sans-serif;
        color: #000000;
        line-height: 1.2;
      }

      .win2k-brand-text p {
        margin: 2px 0 0;
        font-size: 10px;
        color: #444444;
        line-height: 1.3;
        font-family: 'Tahoma', Arial, sans-serif;
      }

      /* Form */
      .win2k-body .form {
        display: flex;
        flex-direction: column;
        gap: 0;
        margin-bottom: 8px;
      }

      .win2k-body label {
        font-size: 11px;
        font-family: 'Tahoma', Arial, sans-serif;
        font-weight: 400;
        color: #000000;
        margin-bottom: 2px;
        display: block;
        margin-top: 8px;
      }

      .win2k-body label:first-child {
        margin-top: 0;
      }

      /* Win2K text input — inset sunken appearance */
      .win2k-body input[type="email"],
      .win2k-body input[type="password"],
      .win2k-body input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        height: 21px;
        padding: 2px 4px;
        background: #ffffff;
        color: #000000;
        font-family: 'Tahoma', 'MS Sans Serif', Arial, sans-serif;
        font-size: 11px;
        border-top: 2px solid #808080;
        border-left: 2px solid #808080;
        border-right: 2px solid #ffffff;
        border-bottom: 2px solid #ffffff;
        border-radius: 0;
        outline: none;
        box-shadow: inset 1px 1px 0 #404040;
      }

      .win2k-body input[type="email"]:focus,
      .win2k-body input[type="password"]:focus {
        outline: 1px dotted #000000;
        outline-offset: -3px;
        background: #ffffff;
      }

      /* Win2K button — raised 3D */
      .win2k-body .button {
        all: unset;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 14px;
        width: 100%;
        box-sizing: border-box;
        height: 23px;
        padding: 0 12px;
        background: #d4d0c8;
        color: #000000;
        font-family: 'Tahoma', 'MS Sans Serif', Arial, sans-serif;
        font-size: 11px;
        font-weight: 400;
        cursor: pointer;
        border-top: 2px solid #ffffff;
        border-left: 2px solid #ffffff;
        border-right: 2px solid #404040;
        border-bottom: 2px solid #404040;
        box-shadow: inset 1px 1px 0 #e8e4dc, 1px 1px 0 #808080;
        text-align: center;
        border-radius: 0;
      }

      .win2k-body .button:hover {
        background: #e0dcd4;
      }

      .win2k-body .button:active {
        border-top: 2px solid #404040;
        border-left: 2px solid #404040;
        border-right: 2px solid #ffffff;
        border-bottom: 2px solid #ffffff;
        box-shadow: inset 1px 1px 0 #808080;
        padding-left: 13px;
        padding-top: 1px;
      }

      .win2k-body .button:disabled {
        color: #808080;
        cursor: default;
        opacity: 1;
      }

      /* Separator */
      .win2k-separator {
        margin: 10px 0 8px;
        border: none;
        border-top: 1px solid #808080;
        border-bottom: 1px solid #ffffff;
      }

      /* Message area */
      .win2k-body .message {
        min-height: 14px;
        font-size: 10px;
        font-family: 'Tahoma', Arial, sans-serif;
        margin-top: 6px;
        padding: 2px 4px;
        line-height: 1.4;
      }

      .win2k-body .error-message {
        color: #cc0000;
      }

      .win2k-body .success-message {
        color: #006600;
      }

      /* Helper text / links */
      .win2k-body .helper-text {
        font-size: 10px;
        font-family: 'Tahoma', Arial, sans-serif;
        color: #000000;
        margin-top: 8px;
        text-align: center;
      }

      .win2k-body .helper-text a {
        color: #0000cc;
        text-decoration: underline;
        font-weight: 400;
      }

      .win2k-body .helper-text a:hover {
        color: #cc0000;
      }

      /* Bottom status bar */
      .win2k-statusbar {
        background: #d4d0c8;
        border-top: 1px solid #808080;
        padding: 2px 6px;
        font-size: 10px;
        font-family: 'Tahoma', Arial, sans-serif;
        color: #444444;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .win2k-statusbar-panel {
        border-top: 1px solid #808080;
        border-left: 1px solid #808080;
        border-right: 1px solid #ffffff;
        border-bottom: 1px solid #ffffff;
        padding: 1px 6px;
        font-size: 10px;
      }
    </style>
  </head>
  <body class="auth-page">
    <main class="auth-container">
      <section class="auth-card" role="dialog" aria-labelledby="win2k-title" aria-modal="true">

        <!-- Title Bar -->
        <div class="win2k-titlebar">
          <span class="win2k-titlebar-text">
            <span class="win2k-titlebar-icon" aria-hidden="true">&#9971;</span>
            Golf Charity Platform — Sign In
          </span>
          <div class="win2k-titlebar-btns" aria-hidden="true">
            <span class="win2k-titlebar-btn" title="Minimize">_</span>
            <span class="win2k-titlebar-btn" title="Maximize">&#9633;</span>
            <span class="win2k-titlebar-btn" title="Close">&#x2715;</span>
          </div>
        </div>

        <!-- Dialog Body -->
        <div class="win2k-body">

          <!-- Brand block -->
          <div class="win2k-brand">
            <div class="win2k-brand-icon" aria-hidden="true">&#9971;</div>
            <div class="win2k-brand-text">
              <h1 id="win2k-title">Golf Charity Subscription</h1>
              <p>Sign in to view your scores, charity selection, and draw result.</p>
            </div>
          </div>

          <!-- Login Form -->
          <form id="loginForm" class="form" novalidate>
            <label for="email">Email address:</label>
            <input id="email" name="email" type="email" placeholder="user@example.com" required autocomplete="username" />

            <label for="password">Password:</label>
            <input id="password" name="password" type="password" placeholder="••••••••" required autocomplete="current-password" />

            <button id="loginButton" type="submit" class="button">OK</button>
          </form>

          <p id="message" class="message" aria-live="polite"></p>

          <hr class="win2k-separator" />

          <p class="helper-text">
            New user? <a href="./register.html">Create an account</a>
          </p>

        </div><!-- /.win2k-body -->

        <!-- Status Bar -->
        <div class="win2k-statusbar" aria-hidden="true">
          <span class="win2k-statusbar-panel">Ready</span>
          <span class="win2k-statusbar-panel">Golf Charity Platform v1.0</span>
        </div>

      </section>
    </main>

    <script src="./js/config.js"></script>
    <script src="./js/login.js"></script>
  </body>
</html>
